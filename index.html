<html lang="de">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; color: #1a1a1a; }

    .header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .header-logo { width: 38px; height: 38px; background: #cc2200; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10px; color: white; flex-shrink: 0; }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-sub { font-size: 12px; color: #aaa; margin-top: 1px; }

    .search-bar { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e8e8e8; }
    .search-bar input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #ddd; background: #f8f8f8; font-size: 15px; color: #1a1a1a; outline: none; }
    .search-bar input:focus { border-color: #cc2200; background: #fff; }

    .cats { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; background: #fff; border-bottom: 1px solid #e8e8e8; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .cats::-webkit-scrollbar { display: none; }
    .cat-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #ddd; background: transparent; font-size: 13px; cursor: pointer; white-space: nowrap; color: #666; transition: all 0.15s; }
    .cat-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .count { font-size: 12px; color: #999; padding: 10px 16px 4px; }

    .items { padding: 8px 16px 24px; display: flex; flex-direction: column; gap: 10px; }

    .item-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
    .item-card:hover { border-color: #bbb; }
    .item-card.selected { border-color: #cc2200; border-width: 2px; }

    .item-main { padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .item-code { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: 0.04em; }
    .item-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-top: 2px; }
    .item-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .item-price { font-size: 15px; font-weight: 600; color: #cc2200; }
    .chevron { font-size: 14px; color: #bbb; transition: transform 0.2s; }
    .item-card.selected .chevron { transform: rotate(180deg); }
    .has-img-dot { width: 6px; height: 6px; background: #cc2200; border-radius: 50%; opacity: 0.5; }

    .item-tags { display: flex; gap: 6px; padding: 0 16px 12px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 12px; font-weight: 500; }
    .tag-vegan { background: #e8f5e0; color: #2d7a1a; }
    .tag-veggi { background: #e8f5e0; color: #2d7a1a; }
    .tag-spicy { background: #fdecea; color: #c0392b; }
    .tag-fisch { background: #e8f0fd; color: #1a5cbf; }

    .detail-expand { border-top: 1px solid #f0f0f0; max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .detail-expand.open { max-height: 600px; }

    .detail-img-wrap { width: 100%; background: #f5f0e8; }
    .detail-img-wrap svg { display: block; width: 100%; height: auto; }
    .img-note { font-size: 10px; color: #bbb; padding: 4px 16px 6px; font-style: italic; }

    .no-img { background: #f8f8f8; height: 100px; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 13px; gap: 8px; }

    .detail-body { padding: 14px 16px 16px; }
    .detail-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; margin-top: 12px; }
    .detail-label:first-child { margin-top: 0; }
    .ingredient-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { font-size: 12px; padding: 4px 10px; background: #f4f4f4; border: 1px solid #e8e8e8; border-radius: 12px; color: #555; }
    .allergen { font-size: 12px; padding: 4px 10px; background: #fff8ee; color: #a0600a; border-radius: 12px; border: 1px solid #f0d8a8; display: inline-block; margin: 2px 4px 2px 0; }
    .note-val { font-size: 13px; color: #666; }
    .detail-price { margin-top: 14px; font-size: 20px; font-weight: 700; color: #cc2200; }

    .empty { text-align: center; padding: 50px 20px; color: #bbb; font-size: 14px; }

    @media (min-width: 600px) {
      .items { max-width: 600px; margin: 0 auto; }
      .search-bar, .cats, .count { max-width: 600px; margin: 0 auto; }
    }
  </style>

  {code:'B211',name:'Gebratener Reis mit Gemüse',cat:'Hauptgerichte',price:'12,90',ingredients:['Gebratener Reis','Gemüse','Sesam'],allergens:['A','F','K'],tags:['vegan']},
  {code:'P1',name:'Veggie Poke Bowl',cat:'Poke Bowls',price:'13,90',ingredients:['Sushireis','Gurke','Avocado','Edamame','Mais','Karotten','Tofutasche','Sesam'],allergens:['F','K'],tags:['vegan']},
  {code:'P4',name:'Alaska Poke Bowl',cat:'Poke Bowls',price:'14,90',ingredients:['Sushireis','Lachs','Avocado','Gurke','Mais','Edamame','Karotten','Sesam'],allergens:['D','F','K'],tags:['fisch']},
  {code:'P5',name:'Salmon Poke Bowl',cat:'Poke Bowls',price:'14,50',ingredients:['Sushireis','Gegarter Lachs','Avocado','Gurke','Mais','Edamame','Karotten','Sesam'],allergens:['A','C','D','F','G','K'],tags:['fisch']},
  {code:'P6',name:'Salmon Tobiko Poke Bowl',cat:'Poke Bowls',price:'15,50',ingredients:['Sushireis','Lachs','Avocado','Gurke','Mais','Edamame','Tobiko','Sesam'],allergens:['D','F','K'],tags:['fisch']},
];

const cats = ['Alle', ...[...new Set(menu.map(i => i.cat))]];
let activeCat = 'Alle', selectedCode = null;

function init() {
  const el = document.getElementById('cats');
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === activeCat ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => { activeCat = c; selectedCode = null; render(); };
    el.appendChild(btn);
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = menu.filter(i => {
    const mc = activeCat === 'Alle' || i.cat === activeCat;
    const mq = !q || i.code.toLowerCase().includes(q) || i.name.toLowerCase().includes(q) || i.ingredients.join(' ').toLowerCase().includes(q);
    return mc && mq;
  });

  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', cats[i] === activeCat));
  document.getElementById('count').textContent = filtered.length + ' Gerichte';

  const el = document.getElementById('items');
  el.innerHTML = '';
  if (!filtered.length) { el.innerHTML = '<div class="empty">Keine Gerichte gefunden 🍱</div>'; return; }

  filtered.forEach(item => {
    const isSel = item.code === selectedCode;
    const allergenNames = item.allergens.map(a => ALLERGENS[a] || a);
    const tagHTML = item.tags.map(t =>
      `<span class="tag tag-${t}">${t==='veggi'?'🌿 Vegetarisch':t==='vegan'?'🌱 Vegan':t==='spicy'?'🌶 Scharf':'🐟 Fisch'}</span>`
    ).join('');

    let imgHTML = '';
    if (item.img && IMGS[item.img]) {
      imgHTML = `<div class="detail-img-wrap">${IMGS[item.img]}</div>
                 <div class="img-note">Illustration — echte Fotos werden vom Restaurant geliefert</div>`;
    } else {
      imgHTML = `<div class="no-img">📷 Foto folgt</div>`;
    }

    const detailHTML = imgHTML + `
      <div class="detail-body">
        <div class="detail-label">Zutaten</div>
        <div class="ingredient-chips">${item.ingredients.map(i => `<span class="chip">${i}</span>`).join('')}</div>
        ${allergenNames.length ? `<div class="detail-label">Allergene</div><div>${allergenNames.map(a => `<span class="allergen">${a}</span>`).join('')}</div>` : ''}
        ${item.note ? `<div class="detail-label">Portionsgröße</div><div class="note-val">${item.note}</div>` : ''}
        <div class="detail-price">€ ${item.price}</div>
      </div>`;

    const card = document.createElement('div');
    card.className = 'item-card' + (isSel ? ' selected' : '');
    card.innerHTML = `
      <div class="item-main">
        <div>
          <div class="item-code">${item.code}</div>
          <div class="item-name">${item.name}</div>
        </div>
        <div class="item-right">
          ${item.img ? '<div class="has-img-dot"></div>' : ''}
          <span class="item-price">€ ${item.price}</span>
          <span class="chevron">${isSel ? '▲' : '▼'}</span>
        </div>
      </div>
      ${tagHTML ? `<div class="item-tags">${tagHTML}</div>` : ''}
      <div class="detail-expand ${isSel ? 'open' : ''}">${detailHTML}</div>`;

    card.querySelector('.item-main').addEventListener('click', () => {
      selectedCode = isSel ? null : item.code;
      render();
    });
    el.appendChild(card);
  });
}

init();
render();
</script>
</body>
</html>
